name: Eklentiyi Derle
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Java 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Izinleri Ayarla ve Derle
      run: |
        chmod +x gradlew
        ./gradlew make
    - name: Kurulum Dosyasini (cs3) Hazirla
      uses: actions/upload-artifact@v4
      with:
        name: BenimEklentim
        path: "**/build/*.cs3"
